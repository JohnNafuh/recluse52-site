<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartContainer = document.getElementById("cartItems");
let totalEl = document.getElementById("cartTotal");

function removeItem(index){
cart.splice(index,1);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function renderCart(){

cartContainer.innerHTML = "";

if(cart.length === 0){
cartContainer.innerHTML = "<div class='empty'>YOUR CART IS EMPTY</div>";
totalEl.innerText = "";
return;
}

let total = 0;

cart.forEach((item,index)=>{

let price = Number(item.price);

if(!price) price = 0; // safety fix

total += price;

cartContainer.innerHTML += `
<div class="cart-item">

<img src="${item.img}">

<div class="item-info">
<div class="item-name">${item.name}</div>
<div class="item-price">₦${price.toLocaleString()}</div>
</div>

<div class="remove" onclick="removeItem(${index})">
REMOVE
</div>

</div>
`;
});

totalEl.innerText = "TOTAL: ₦" + total.toLocaleString();
}

renderCart();

</script>
