<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE | CART</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:25px;
font-size:28px;
letter-spacing:5px;
}

nav{
text-align:center;
margin-bottom:30px;
}

nav a{
color:white;
text-decoration:none;
margin:0 12px;
font-size:13px;
opacity:0.7;
}

nav a:hover{
opacity:1;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.cart-item{
display:flex;
align-items:center;
gap:20px;
border-bottom:1px solid #222;
padding:20px 0;
}

.cart-item img{
width:90px;
height:110px;
object-fit:cover;
border:1px solid #333;
}

.item-info{
flex:1;
}

.item-name{
letter-spacing:2px;
font-size:14px;
}

.item-price{
opacity:0.6;
font-size:12px;
margin-top:4px;
}

.remove{
cursor:pointer;
font-size:12px;
border:1px solid white;
padding:6px 10px;
}

.remove:hover{
background:white;
color:black;
}

.total{
margin-top:30px;
font-size:18px;
letter-spacing:2px;
}

.checkout{
margin-top:15px;
display:inline-block;
padding:10px 16px;
border:1px solid white;
cursor:pointer;
background:transparent;
color:white;
text-decoration:none;
}

.checkout:hover{
background:white;
color:black;
}

.empty{
opacity:0.5;
text-align:center;
margin-top:40px;
}
</style>
</head>

<body>

<header>RECLUSE</header>

<nav>
<a href="index.html">HOME</a>
<a href="shop.html">SHOP</a>
<a href="cart.html">CART 🛒</a>
</nav>

<div class="container">

<div id="cartItems"></div>

<div class="total" id="cartTotal"></div>

<div class="checkout" onclick="checkoutWhatsApp()">
CHECKOUT VIA WHATSAPP
</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartContainer = document.getElementById("cartItems");
let totalEl = document.getElementById("cartTotal");

function removeItem(index){
cart.splice(index,1);
localStorage.setItem("cart", JSON.stringify(cart));
renderCart();
}

function renderCart(){

cartContainer.innerHTML = "";

if(cart.length === 0){
cartContainer.innerHTML = "<div class='empty'>YOUR CART IS EMPTY</div>";
totalEl.innerText = "";
return;
}

let total = 0;

cart.forEach((item, index) => {

let price = Number(item.price) || 0;

total += price;

cartContainer.innerHTML += `
<div class="cart-item">

<img src="${item.img}">

<div class="item-info">
<div class="item-name">${item.name}</div>
<div class="item-price">₦${price.toLocaleString()}</div>
</div>

<div class="remove" onclick="removeItem(${index})">
REMOVE
</div>

</div>
`;
});

totalEl.innerText = "TOTAL: ₦" + total.toLocaleString();
}

/* WHATSAPP CHECKOUT */
function checkoutWhatsApp(){

if(cart.length === 0){
alert("Your cart is empty");
return;
}

let message = "🛒 RECLUSE ORDER\n\n";
let total = 0;

cart.forEach((item,i)=>{
let price = Number(item.price) || 0;
message += `${i+1}. ${item.name} - ₦${price.toLocaleString()}\n`;
total += price;
});

message += `\nTOTAL: ₦${total.toLocaleString()}`;
message += `\n\nPlease confirm my order.`;

let phone = "2347038547668";

let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");
}

renderCart();

</script>

</body>
</html>
