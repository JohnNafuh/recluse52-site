<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE | CART</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:25px;
font-size:28px;
letter-spacing:5px;
}

nav{
text-align:center;
margin-bottom:30px;
}

nav a{
color:white;
text-decoration:none;
margin:0 12px;
font-size:13px;
opacity:0.7;
}

nav a:hover{
opacity:1;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input, textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
background:#111;
border:1px solid #333;
color:white;
outline:none;
}

.cart-item{
display:flex;
align-items:center;
gap:20px;
border-bottom:1px solid #222;
padding:20px 0;
}

.cart-item img{
width:90px;
height:110px;
object-fit:cover;
border:1px solid #333;
}

.item-info{
flex:1;
}

.item-name{
letter-spacing:2px;
font-size:14px;
}

.item-price{
opacity:0.6;
font-size:12px;
margin-top:4px;
}

.meta{
font-size:11px;
opacity:0.6;
margin-top:5px;
}

.remove{
cursor:pointer;
font-size:12px;
border:1px solid white;
padding:6px 10px;
}

.remove:hover{
background:white;
color:black;
}

.total{
margin-top:30px;
font-size:18px;
letter-spacing:2px;
}

.checkout{
margin-top:15px;
display:inline-block;
padding:10px 16px;
border:1px solid white;
cursor:pointer;
background:transparent;
color:white;
text-decoration:none;
}

.checkout:hover{
background:white;
color:black;
}

.empty{
opacity:0.5;
text-align:center;
margin-top:40px;
}
</style>
</head>

<body>

<header>RECLUSE</header>

<nav>
<a href="index.html">HOME</a>
<a href="shop.html">SHOP</a>
<a href="cart.html">CART 🛒</a>
</nav>

<div class="container">

<!-- CUSTOMER DETAILS -->
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Delivery Address"></textarea>

<!-- CART ITEMS -->
<div id="cartItems"></div>

<div class="total" id="cartTotal"></div>

<div class="checkout" onclick="checkoutWhatsApp()">
CHECKOUT VIA WHATSAPP
</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("cart", JSON.stringify(cart));
}

function removeItem(index){
cart.splice(index,1);
save();
renderCart();
}

function renderCart(){

let cartContainer = document.getElementById("cartItems");
let totalEl = document.getElementById("cartTotal");

cartContainer.innerHTML = "";

if(cart.length === 0){
cartContainer.innerHTML = "<div class='empty'>YOUR CART IS EMPTY</div>";
totalEl.innerText = "";
return;
}

let total = 0;

cart.forEach((item, index) => {

let price = Number(item.price) || 0;
let qty = Number(item.qty) || 1;

total += price * qty;

cartContainer.innerHTML += `
<div class="cart-item">

<img src="${item.img}">

<div class="item-info">
<div class="item-name">${item.name}</div>
<div class="item-price">₦${price.toLocaleString()}</div>
<div class="meta">Size: ${item.size || "M"} | Qty: ${qty}</div>
</div>

<div class="remove" onclick="removeItem(${index})">
REMOVE
</div>

</div>
`;
});

totalEl.innerText = "TOTAL: ₦" + total.toLocaleString();
}

/* WHATSAPP CHECKOUT */
function checkoutWhatsApp(){

if(cart.length === 0){
alert("Your cart is empty");
return;
}

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;

if(!name || !phone || !address){
alert("Please fill all details");
return;
}

let message =
"🛒 RECLUSE ORDER\n\n" +
"Name: " + name + "\n" +
"Phone: " + phone + "\n" +
"Address: " + address + "\n\n";

let total = 0;

cart.forEach((item,i)=>{
let price = Number(item.price) || 0;
let qty = Number(item.qty) || 1;

message += `${i+1}. ${item.name} (${item.size || "M"}) x${qty} - ₦${(price*qty).toLocaleString()}\n`;

total += price * qty;
});

message += `\nTOTAL: ₦${total.toLocaleString()}`;
message += `\n\nI wish to place my order now`;

let whatsappNumber = "2347038547668";

let url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");
}

renderCart();

</script>

</body>
</html>
