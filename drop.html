<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE | DROP</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    text-align: center;
}

header {
    padding: 30px;
    font-size: 28px;
    letter-spacing: 6px;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 12px;
    font-size: 13px;
    opacity: 0.7;
}

nav a:hover {
    opacity: 1;
}

.hero {
    margin-top: 80px;
}

.hero h1 {
    font-size: 60px;
    letter-spacing: 10px;
}

.hero p {
    opacity: 0.7;
}

/* BUTTON */
.btn {
    margin-top: 30px;
    padding: 10px 18px;
    border: 1px solid white;
    display: inline-block;
    text-decoration: none;
    color: white;
}

.btn:hover {
    background: white;
    color: black;
}

/* 🔥 DROP IMAGE LOCK STYLE */
.drop-img {
    width: 85%;
    max-width: 500px;
    height: auto;
    filter: brightness(0.35) blur(1px);
    border: 1px solid #333;
    transition: 0.5s;
}

.drop-img:hover {
    filter: brightness(0.6) blur(0px);
}
</style>
</head>

<body>

<header>RECLUSE</header>

<nav>
    <a href="index.html">HOME</a>
    <a href="shop.html">SHOP</a>
    <a href="drop.html">DROP</a>
    <a href="#">ARCHIVE</a>
</nav>

<div class="hero">
    <h1>DROP 01</h1>
    <p>LIMITED TEE COLLECTION — COMING SOON</p>
</div>

<!-- FEATURED PRODUCT -->
<div style="margin-top:50px;">
    <img src="B4E664D9-A44D-4442-A75E-F1E4BE1987B5.png" class="drop-img">

    <h2 style="margin-top:20px; letter-spacing:3px;">RECLUSE TEE</h2>
    <p style="opacity:0.6;">🔒 COMING SOON — NOT RELEASED YET</p>
</div>

<!-- COUNTDOWN -->
<div style="margin-top:40px; font-size:28px;" id="timer">
LOADING DROP TIMER...
</div>

<a href="#" class="btn">LOCKED UNTIL DROP</a>

<script>
function countdown() {
    const target = new Date();
    target.setDate(target.getDate() + 3);

    setInterval(() => {
        const now = new Date().getTime();
        const distance = target - now;

        const hours = Math.floor(distance / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("timer").innerHTML =
        "DROP IN: " + hours + "H " + minutes + "M " + seconds + "S";

        if (distance < 0) {
            document.getElementById("timer").innerHTML = "LIVE NOW 🔥";
        }
    }, 1000);
}

countdown();
</script>

</body>
</html>
