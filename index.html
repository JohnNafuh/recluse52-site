<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

header {
    text-align: center;
    padding: 30px;
}

.logo {
    height: 70px;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

nav {
    text-align: center;
    margin-bottom: 40px;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 12px;
    font-size: 13px;
    opacity: 0.7;
}

nav a:hover {
    opacity: 1;
}

.hero {
    height: 70vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 70px;
    letter-spacing: 10px;
    margin: 0;
}

.hero p {
    opacity: 0.7;
    margin-top: 10px;
}

.btn {
    margin-top: 25px;
    padding: 10px 18px;
    border: 1px solid white;
    color: white;
    text-decoration: none;
    display: inline-block;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

.section {
    padding: 60px 20px;
    text-align: center;
}

.section h2 {
    letter-spacing: 4px;
    margin-bottom: 20px;
}

.small-text {
    opacity: 0.6;
    max-width: 600px;
    margin: auto;
    line-height: 1.6;
}
</style>
</head>

<body>

<header>
    <img src="Yellow%20Black%20Brush%20Streetwear%20Brand%20Logo.png" alt="RECLUSE" class="logo">
</header>

<nav>
<a href="index.html">HOME</a>
<a href="shop.html">SHOP</a>
<a href="drop.html">DROP</a>
<a href="archive.html">ARCHIVE</a>
<a href="cart.html">CART 🛒 (<span id="cart-count">0</span>)</a>
</nav>

<div class="hero">
    <h1>NO REST</h1>
    <p>Streetwear built in silence. Worn in power.</p>
    <a href="shop.html" class="btn">ENTER SHOP</a>
</div>

<div class="section">
    <h2>ABOUT RECLUSE</h2>
    <p class="small-text">
        RECLUSE is a streetwear identity built around minimal design, limited drops,
        and quiet confidence. No noise. No trends. Just presence.
    </p>
</div>
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let counter = document.getElementById("cartCount");

if(counter){
counter.innerText = cart.length;
}
<script>

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("cart-count").innerText = cart.length;

</script>
</body>
</html>
