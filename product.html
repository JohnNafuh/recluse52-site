<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE | Product</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

header {
    text-align: center;
    padding: 25px;
    letter-spacing: 5px;
    font-size: 28px;
}

nav {
    text-align: center;
    margin-top: 10px;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
    font-size: 13px;
    opacity: 0.7;
}

nav a:hover {
    opacity: 1;
}

/* LAYOUT */
.container {
    display: flex;
    flex-wrap: wrap;
    padding: 40px;
    gap: 40px;
    justify-content: center;
}

/* IMAGE */
.image {
    width: 320px;
    height: 400px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1px solid #333;
}

.image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* DETAILS */
.details {
    max-width: 350px;
}

.details h1 {
    letter-spacing: 3px;
}

.price {
    margin: 10px 0;
    opacity: 0.7;
}

.btn {
    margin-top: 20px;
    padding: 10px 15px;
    border: 1px solid white;
    display: inline-block;
    cursor: pointer;
}

.btn:hover {
    background: white;
    color: black;
}
</style>
</head>

<body>

<header>RECLUSE</header>

<nav>
    <a href="index.html">HOME</a>
    <a href="shop.html">SHOP</a>
    <a href="drop.html">DROP</a>
    <a href="archive.html">ARCHIVE</a>
    <a href="cart.html">CART</a>
</nav>

<div class="container">

    <div class="image">
        <img id="productImg" src="" alt="">
    </div>

    <div class="details">
        <h1 id="productName">Loading...</h1>
        <div class="price" id="productPrice"></div>
        <p id="productDesc"></p>

        <div class="btn" onclick="addToCart()">BUY NOW</div>
    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const img = params.get("img");
const name = params.get("name");
const desc = params.get("desc");

const imageEl = document.getElementById("productImg");
const nameEl = document.getElementById("productName");
const descEl = document.getElementById("productDesc");
const priceEl = document.getElementById("productPrice");

// Load product
if (!img || !name || !desc) {
    nameEl.innerText = "PRODUCT NOT FOUND";
    descEl.innerText = "Missing product data";
    imageEl.style.display = "none";
} else {
    imageEl.src = img;
    nameEl.innerText = name;
    descEl.innerText = desc;
    priceEl.innerText = "LIMITED DROP PIECE";
}

// 🛒 CART FUNCTION (FIXED)
function addToCart() {

    if (!img || !name) {
        alert("Product not loaded properly");
        return;
    }

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const product = {
        img: img,
        name: name,
        desc: desc,
        qty: 1
    };

    const existing = cart.find(item => item.name === name);

    if (existing) {
        existing.qty += 1;
    } else {
        cart.push(product);
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("Added to cart 🛒");
}
</script>

</body>
</html>
