<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE | PRODUCT</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:25px;
font-size:28px;
letter-spacing:5px;
}

nav{
text-align:center;
margin-top:10px;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-size:13px;
opacity:0.7;
}

nav a:hover{
opacity:1;
}

.container{
display:flex;
flex-wrap:wrap;
padding:40px;
gap:40px;
justify-content:center;
}

.image{
width:320px;
height:400px;
border:1px solid #333;
overflow:hidden;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
}

.details{
max-width:350px;
}

.details h1{
letter-spacing:3px;
}

.price{
margin:10px 0;
opacity:0.7;
font-size:14px;
}

.btn{
margin-top:20px;
padding:12px 18px;
border:1px solid white;
background:transparent;
color:white;
cursor:pointer;
transition:0.25s;
font-size:14px;
letter-spacing:1px;
}

.btn:hover{
background:white;
color:black;
}
</style>
</head>

<body>

<header>RECLUSE</header>

<nav>
<a href="index.html">HOME</a>
<a href="shop.html">SHOP</a>
<a href="drop.html">DROP</a>
<a href="cart.html">CART 🛒</a>
</nav>

<div class="container">

<div class="image">
<img id="img">
</div>

<div class="details">
<h1 id="name"></h1>
<div class="price" id="price"></div>
<p id="desc"></p>

<button class="btn" onclick="addToCart()">ADD TO CART</button>
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

/* SUPPORT BOTH SYSTEMS */
const id = params.get("id");

let img = params.get("img");
let name = params.get("name");
let price = params.get("price");
let desc = params.get("desc");

/* IF ID-STYLE LINK (FUTURE SAFE) */
const productDB = {
  "dreams-tee": {
    img: "233d44f0-6ed6-4388-9a0f-69d90e762b66.jpeg",
    name: "RECLUSE DREAMS",
    price: 30000,
    desc: "Dream-inspired minimal streetwear tee"
  }
};

if(id && productDB[id]){
  img = productDB[id].img;
  name = productDB[id].name;
  price = productDB[id].price;
  desc = productDB[id].desc;
}

/* VALIDATION */
if(!img || !name || !price){
  document.querySelector(".container").innerHTML =
  "<h2 style='text-align:center;'>PRODUCT NOT FOUND</h2>";
} else {
  document.getElementById("img").src = img;
  document.getElementById("name").innerText = name;
  document.getElementById("desc").innerText = desc || "";
  document.getElementById("price").innerText = "₦" + Number(price).toLocaleString();
}

/* CART */
function addToCart(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({img, name, price});

localStorage.setItem("cart", JSON.stringify(cart));

alert("Added to cart");
}
</script>

</body>
</html>
