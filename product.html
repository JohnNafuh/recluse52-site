<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE | PRODUCT</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

header {
    text-align: center;
    padding: 25px;
    font-size: 28px;
    letter-spacing: 5px;
}

nav {
    text-align: center;
    margin-top: 10px;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
    font-size: 13px;
    opacity: 0.7;
}

nav a:hover {
    opacity: 1;
}

.container {
    display: flex;
    flex-wrap: wrap;
    padding: 40px;
    gap: 40px;
    justify-content: center;
}

.image {
    width: 320px;
    height: 400px;
    border: 1px solid #333;
    overflow: hidden;
}

.image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.details {
    max-width: 350px;
}

.details h1 {
    letter-spacing: 3px;
}

.price {
    margin: 10px 0;
    opacity: 0.7;
}

.btn {
    margin-top: 20px;
    padding: 10px 15px;
    border: 1px solid white;
    display: inline-block;
    cursor: pointer;
}

.btn:hover {
    background: white;
    color: black;
}
</style>
</head>

<body>

<header>RECLUSE</header>

<nav>
<a href="index.html">HOME</a>
<a href="shop.html">SHOP</a>
<a href="drop.html">DROP</a>
<a href="archive.html">ARCHIVE</a>
<a href="cart.html">CART 🛒 <span id="cartCount">0</span></a>
</nav>

<div class="container">

    <div class="image">
        <img id="img">
    </div>

    <div class="details">
        <h1 id="name">Loading...</h1>
        <div class="price">₦30,000</div>
        <p id="desc"></p>

        <div class="btn" onclick="addToCart()">BUY NOW</div>
    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const img = params.get("img");
const name = params.get("name");
const desc = params.get("desc");

document.getElementById("img").src = img;
document.getElementById("name").innerText = name;
document.getElementById("desc").innerText = desc;

// CART SYSTEM
function addToCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({
        img: img,
        name: name,
        desc: desc,
        price: 30000,
        qty: 1
    });

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("Added to cart 🛒");
}
</script>

</body>
</html>
