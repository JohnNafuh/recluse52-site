<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE | PRODUCT</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:25px;
letter-spacing:5px;
font-size:26px;
}

nav{
text-align:center;
margin-bottom:20px;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-size:13px;
opacity:0.7;
}

nav a:hover{
opacity:1;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
padding:40px;
}

.image{
width:320px;
height:420px;
border:1px solid #222;
overflow:hidden;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
}

.details{
max-width:350px;
}

.details h1{
letter-spacing:3px;
}

.price{
margin:10px 0;
opacity:0.7;
}

.desc{
opacity:0.6;
line-height:1.6;
font-size:14px;
}

.btn{
margin-top:20px;
padding:12px 18px;
border:1px solid white;
background:transparent;
color:white;
cursor:pointer;
letter-spacing:2px;
}

.btn:hover{
background:white;
color:black;
}
</style>
</head>

<body>

<header>RECLUSE</header>

<nav>
<a href="index.html">HOME</a>
<a href="shop.html">SHOP</a>
<a href="cart.html">CART 🛒 <span id="cartCount">0</span></a>
</nav>

<div class="container">

<div class="image">
<img id="img">
</div>

<div class="details">
<h1 id="name"></h1>
<div class="price" id="price"></div>
<p class="desc" id="desc"></p>

<button class="btn" onclick="addToCart()">ADD TO CART</button>
</div>

</div>

<script>

const products = {

"beer-tee":{
img:"a041ae76-2fca-4c0c-9cac-6bcdfc03dd88.jpeg",
name:"RECLUSE BEER TEE",
price:30000,
desc:"Minimal street graphic tee with bold back print."
},

"smoked-flower":{
img:"2af34606-1479-4be7-a83d-7b61140dda21.jpeg",
name:"RECLUSE SMOKED FLOWER",
price:30000,
desc:"Smoked floral graphic tee with premium cotton finish."
},

"chain-heart":{
img:"e875715a-90af-4361-b1a9-9fe4e38f0a67.jpeg",
name:"RECLUSE CHAIN HEART",
price:30000,
desc:"Heavy streetwear tee featuring chain heart graphic."
},

"dreams":{
img:"233d44f0-6ed6-4388-9a0f-69d90e762b66.jpeg",
name:"RECLUSE DREAMS",
price:30000,
desc:"Minimal dream-inspired streetwear tee."
},

"sleeveless-sword":{
img:"photo-output.jpeg",
name:"RECLUSE SWORD VEST",
price:28000,
desc:"Black sleeveless vest featuring Samurai sword graphic."
}

};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const product = products[id];

if(product){

document.getElementById("img").src = product.img;
document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = "₦" + product.price.toLocaleString();
document.getElementById("desc").innerText = product.desc;

}else{

document.body.innerHTML =
"<h2 style='text-align:center;margin-top:80px;'>Product not found</h2>";

}

function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push(product);

localStorage.setItem("cart",JSON.stringify(cart));

updateCartCount();

alert("Added to cart");

}

function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("cartCount").innerText = cart.length;

}

updateCartCount();

</script>

</body>
</html>
