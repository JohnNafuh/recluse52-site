<style>
body {
    margin: 0;

    background: #0b0b0b;

}

header {

    letter-spacing: 5px;
}

nav {

    margin-bottom: 20px;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;

    opacity: 0.7;
}

nav a:hover {
    opacity: 1;
}

.tabs {

.shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

    padding: 40px;

    margin: auto;
}

.product-card {
    background: #111;
    border: 1px solid #222;
    overflow: hidden;
}

.product-card img {
    width: 100%;
    height: 260px;

}

.product-info {

}

.product-title {
    font-size: 14px;
    letter-spacing: 2px;
}

.product-price {
    font-size: 12px;
    opacity: 0.6;

.btn {
