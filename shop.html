<title>RECLUSE | SHOP</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px;
    font-size: 28px;
    letter-spacing: 6px;
}

/* NAV */
nav {
    text-align: center;
    margin-bottom: 20px;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 12px;
    font-size: 13px;
    opacity: 0.7;
}

nav a:hover {
    opacity: 1;
}

/* GRID */
.shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 40px;
    max-width: 1000px;
    margin: auto;
}

/* CARD */
.product-card {
    background: #111;
    border: 1px solid #222;
    overflow: hidden;
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-5px);
    border-color: #444;
}

/* IMAGE */
.product-card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
}

/* INFO */
.product-info {
    padding: 15px;
    text-align: center;
}

.product-title {
    font-size: 14px;
    letter-spacing: 2px;
}

.product-price {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 5px;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.4);
    font-size: 12px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}
</style>
</head>
