<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE | SHOP</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

header {
    text-align: center;
    padding: 25px;
    font-size: 28px;
    letter-spacing: 5px;
}

nav {
    text-align: center;
    margin-bottom: 20px;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
    font-size: 13px;
    opacity: 0.7;
}

nav a:hover {
    opacity: 1;
}

.shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 40px;
    max-width: 1000px;
    margin: auto;
}

.product-card {
    background: #111;
    border: 1px solid #222;
    overflow: hidden;
}

.product-card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    pointer-events: none;
}

.product-info {
    padding: 15px;
    text-align: center;
}

.product-title {
    font-size: 14px;
    letter-spacing: 2px;
}

.product-price {
    font-size: 12px;
    opacity: 0.6;
}

.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 14px;
    border: 1px solid white;
    font-size: 12px;
    text-decoration: none;
    color: white;
}

.btn:hover {
    background: white;
    color: black;
}

/* 🔥 SLEEVELESS SECTION FIX */
#sleeveless {
    margin-top: 60px;
    padding: 60px 20px;
    text-align: center;
    border-top: 1px solid #222;
    border-bottom: 1px solid #222;
}

#sleeveless h2 {
    font-size: 22px;
    letter-spacing: 4px;
    margin-bottom: 10px;
    font-family: Arial;
}

#sleeveless p {
    opacity: 0.6;
    max-width: 600px;
    margin: auto;
    font-size: 14px;
}
</style>
</head>

<body>

<header>RECLUSE</header>

<nav>
<a href="index.html">HOME</a>
<a href="shop.html">SHOP</a>
<a href="drop.html">DROP</a>
<a href="cart.html">CART 🛒 <span id="cartCount">0</span></a>
</nav>

<!-- PRODUCTS -->
<div class="shop-grid">

    <div class="product-card">
        <img src="a041ae76-2fca-4c0c-9cac-6bcdfc03dd88.jpeg">
        <div class="product-info">
            <div class="product-title">RECLUSE BEER TEE</div>
            <div class="product-price">₦30,000</div>
            <a class="btn" href="product.html?img=a041ae76-2fca-4c0c-9cac-6bcdfc03dd88.jpeg&name=RECLUSE%20BEER%20TEE&price=30000">
            VIEW PRODUCT</a>
        </div>
    </div>

    <div class="product-card">
        <img src="2af34606-1479-4be7-a83d-7b61140dda21.jpeg">
        <div class="product-info">
            <div class="product-title">RECLUSE SMOKED FLOWER</div>
            <div class="product-price">₦30,000</div>
            <a class="btn" href="product.html?img=2af34606-1479-4be7-a83d-7b61140dda21.jpeg&name=RECLUSE%20SMOKED%20FLOWER&price=30000">
            VIEW PRODUCT</a>
        </div>
    </div>

</div>

<!-- 🔥 SLEEVELESS SECTION (NOW PROPER) -->
<div id="sleeveless">
    <h2>SLEEVELESS DROP</h2>
    <p>Lightweight essentials built for heat, movement, and silence. Limited pieces only.</p>

    <div style="margin-top:30px;">
        <a href="shop.html" class="btn">ENTER SLEEVELESS DROP</a>
    </div>
</div>

<script>
function updateCartCounter(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    document.getElementById("cartCount").innerText = cart.length;
}

updateCartCounter();
window.addEventListener("storage", updateCartCounter);
</script>

</body>
</html>
