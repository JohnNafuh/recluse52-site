<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE | PRODUCT</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px;
    font-size: 28px;
    letter-spacing: 6px;
}

/* NAV */
nav {
    text-align: center;
    margin-bottom: 20px;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 12px;
    font-size: 13px;
    opacity: 0.7;
}

nav a:hover {
    opacity: 1;
}

/* LAYOUT */
.wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    max-width: 1000px;
    margin: auto;
    padding: 40px;
}

/* IMAGE */
.product-img {
    width: 100%;
    max-width: 500px;
    border: 1px solid #333;
    display: block;
    margin: auto;
}

/* TEXT */
h1 {
    letter-spacing: 3px;
    margin-bottom: 10px;
}

p {
    opacity: 0.7;
    line-height: 1.5;
}

/* SIZE */
.sizes {
    margin-top: 20px;
}

.size-btn {
    display: inline-block;
    padding: 10px 14px;
    border: 1px solid #444;
    margin-right: 8px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 12px;
}

.size-btn:hover {
    background: white;
    color: black;
}

/* BUTTON */
.buy-btn {
    display: inline-block;
    margin-top: 25px;
    padding: 12px 20px;
    border: 1px solid white;
    text-decoration: none;
    color: white;
    letter-spacing: 2px;
    transition: 0.3s;
}

.buy-btn:hover {
    background: white;
    color: black;
}

/* BACK */
.back {
    display: inline-block;
    margin-top: 20px;
    opacity: 0.6;
    text-decoration: none;
    color: white;
}

.back:hover {
    opacity: 1;
}

/* MOBILE */
@media(max-width: 768px){
    .wrapper {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<header>RECLUSE</header>

<nav>
    <a href="index.html">HOME</a>
    <a href="shop.html">SHOP</a>
    <a href="drop.html">DROP</a>
    <a href="#">ARCHIVE</a>
</nav>

<div class="wrapper">

    <!-- IMAGE -->
    <div>
        <img id="productImg" class="product-img">
    </div>

    <!-- INFO -->
    <div>
        <h1 id="productName"></h1>
        <p id="productDesc"></p>

        <p style="margin-top:15px; opacity:0.5;">SELECT SIZE</p>

        <div class="sizes">
            <div class="size-btn">S</div>
            <div class="size-btn">M</div>
            <div class="size-btn">L</div>
            <div class="size-btn">XL</div>
        </div>

        <a href="shop.html" class="buy-btn">BACK TO SHOP</a>
    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

/* 🔥 DIRECT DATA FROM URL (NO MORE BUGS) */
const img = params.get("img");
const name = params.get("name");
const desc = params.get("desc");

/* SAFETY CHECK */
if (!img || !name) {
    document.getElementById("productName").innerText = "PRODUCT NOT FOUND";
    document.getElementById("productDesc").innerText = "";
} else {
    document.getElementById("productImg").src = img;
    document.getElementById("productName").innerText = name;
    document.getElementById("productDesc").innerText = desc;
}
</script>

</body>
</html>
