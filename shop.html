<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE | Shop</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0b0b;
        color: white;
    }

    header {
        text-align: center;
        padding: 25px;
        font-size: 28px;
        letter-spacing: 6px;
    }

    nav {
        text-align: center;
        margin-bottom: 30px;
    }

    nav a {
        color: white;
        text-decoration: none;
        margin: 0 12px;
        font-size: 13px;
        opacity: 0.8;
    }

    nav a:hover {
        opacity: 1;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 25px;
        padding: 20px;
    }

    .card {
        background: #111;
        border: 1px solid rgba(255,255,255,0.1);
        overflow: hidden;
        transition: 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        border-color: white;
    }

    .img-box {
        height: 260px;
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255,255,255,0.4);
        font-size: 12px;
        letter-spacing: 2px;
    }

    .content {
        padding: 15px;
        text-align: center;
    }

    .name {
        font-size: 14px;
        letter-spacing: 2px;
        margin-bottom: 5px;
    }

    .price {
        font-size: 13px;
        opacity: 0.7;
        margin-bottom: 12px;
    }

    .btn {
        display: inline-block;
        padding: 8px 14px;
        border: 1px solid rgba(255,255,255,0.4);
        font-size: 12px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: white;
        color: black;
    }

</style>
</head>

<body>

<header>RECLUSE</header>

<nav>
    <a href="index.html">HOME</a>
    <a href="shop.html">SHOP</a>
    <a href="#">DROP</a>
    <a href="#">ARCHIVE</a>
</nav>

<div class="container">

    <div class="card">
        <div class="img-box">UPLOAD IMAGE</div>
        <div class="content">
            <div class="name">NO REST HOODIE</div>
            <div class="price">$120 — LIMITED</div>
            <div class="btn">VIEW PRODUCT</div>
        </div>
    </div>

    <div class="card">
        <div class="img-box">UPLOAD IMAGE</div>
        <div class="content">
            <div class="name">RECLUSE TEE</div>
            <div class="price">$60 — CORE</div>
            <div class="btn">VIEW PRODUCT</div>
        </div>
    </div>

    <div class="card">
        <div class="img-box">UPLOAD IMAGE</div>
        <div class="content">
            <div class="name">STREET CARGO</div>
            <div class="price">$90 — DROP 01</div>
            <div class="btn">VIEW PRODUCT</div>
        </div>
    </div>

    <div class="card">
        <div class="img-box">UPLOAD IMAGE</div>
        <div class="content">
            <div class="name">LIMITED CAP</div>
            <div class="price">$40 — ACCESSORY</div>
            <div class="btn">VIEW PRODUCT</div>
        </div>
    </div>

</div>

</body>
</html>
