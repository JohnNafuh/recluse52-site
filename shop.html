<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECLUSE | Shop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: black;
            color: white;
        }

        header {
            padding: 20px;
            text-align: center;
            font-size: 28px;
            letter-spacing: 5px;
        }

        nav {
            text-align: center;
            margin-bottom: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-size: 14px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            border: 1px solid white;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            background: white;
            color: black;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            opacity: 0.8;
            font-size: 14px;
        }

        .btn {
            margin-top: 10px;
            padding: 8px 12px;
            border: 1px solid currentColor;
            display: inline-block;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>RECLUSE</header>

<nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="#">Drop</a>
    <a href="#">Archive</a>
</nav>

<div class="container">

    <div class="card">
        <h3>NO REST HOODIE</h3>
        <p class="price">$120</p>
        <div class="btn">VIEW</div>
    </div>

    <div class="card">
        <h3>RECLUSE TEE</h3>
        <p class="price">$60</p>
        <div class="btn">VIEW</div>
    </div>

    <div class="card">
        <h3>STREET CARGO</h3>
        <p class="price">$90</p>
        <div class="btn">VIEW</div>
    </div>

    <div class="card">
        <h3>LIMITED CAP</h3>
        <p class="price">$40</p>
        <div class="btn">VIEW</div>
    </div>

</div>

</body>
</html>
