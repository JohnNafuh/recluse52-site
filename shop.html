<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECLUSE | SHOP</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px;
    font-size: 28px;
    letter-spacing: 6px;
}

/* NAV */
nav {
    text-align: center;
    margin-bottom: 20px;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 12px;
    font-size: 13px;
    opacity: 0.8;
}

nav a:hover {
    opacity: 1;
}

/* GRID */
.shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 40px;
    max-width: 1000px;
    margin: auto;
}

/* CARD */
.product-card {
    background: #111;
    border: 1px solid #222;
    overflow: hidden;
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-5px);
    border-color: #444;
}

/* IMAGE */
.product-card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    transition: 0.4s;
}

.product-card:hover img {
    transform: scale(1.05);
}

/* INFO */
.product-info {
    padding: 15px;
    text-align: center;
}

.product-title {
    font-size: 14px;
    letter-spacing: 2px;
}

.product-price {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 5px;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.4);
    font-size: 12px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}
</style>
</head>

<body>

<header>RECLUSE</header>

<nav>
    <a href="index.html">HOME</a>
    <a href="shop.html">SHOP</a>
    <a href="drop.html">DROP</a>
    <a href="#">ARCHIVE</a>
</nav>

<div class="shop-grid">

    <div class="product-card">
        <img src="a041ae76-2fca-4c0c-9cac-6bcdfc03dd88.jpeg">
        <div class="product-info">
            <div class="product-title">NO REST TEE</div>
            <div class="product-price">$120 — LIMITED DROP</div>
            <a href="product.html?item=tee1" class="btn">VIEW PRODUCT</a>
        </div>
    </div>

    <div class="product-card">
        <img src="2af34606-1479-4be7-a83d-7b61140dda21.jpeg">
        <div class="product-info">
            <div class="product-title">RECLUSE TEE</div>
            <div class="product-price">$60 — CORE</div>
            <a href="product.html?item=tee2" class="btn">VIEW PRODUCT</a>
        </div>
    </div>

    <div class="product-card">
        <img src="e875715a-90af-4361-b1a9-9fe4e38f0a67.jpeg">
        <div class="product-info">
            <div class="product-title">STREET CARGO</div>
            <div class="product-price">$90 — DROP 01</div>
            <a href="product.html?item=tee3" class="btn">VIEW PRODUCT</a>
        </div>
    </div>

    <div class="product-card">
        <img src="233d44f0-6ed6-4388-9a0f-69d90e762b66.jpeg">
        <div class="product-info">
            <div class="product-title">LIMITED CAP</div>
            <div class="product-price">$40 — ACCESSORY</div>
            <a href="product.html?item=tee4" class="btn">VIEW PRODUCT</a>
        </div>
    </div>

</div>

</body>
</html>
